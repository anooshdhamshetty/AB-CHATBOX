<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>AB-CHATBOX</title>
<link rel="stylesheet" href="popup.css">
<!-- Local PDF Library -->
<script src="jspdf.min.js"></script>
<!-- Local FileSaver Library -->
<script src="FileSaver.min.js"></script>
</head>

<body>

<div class="container">
    <!-- Header -->
    <div class="header">
        <div class="logo">
            <span class="icon-game">🎮</span>
            <h1>AB-CHATBOX</h1>
        </div>
        <div class="glow-line"></div>
    </div>

    <!-- Input Section -->
    <div class="input-section">
        <textarea id="prompt" placeholder="Enter your command, player..."></textarea>
        <div class="typing-indicator" id="typingIndicator">
            <span></span><span></span><span></span>
        </div>
    </div>

    <!-- Action Buttons -->
    <div class="buttons">
        <button id="ask" class="btn-primary" title="Ask AI">
            <span class="icon">⚡</span>
            <span class="label">ASK</span>
        </button>
        <button id="voice" class="btn-voice" title="Voice Input">
            <span class="icon">🎤</span>
            <span class="label">VOICE</span>
        </button>
        <button id="edit" class="btn-action" title="Edit Input">
            <span class="icon">✏️</span>
            <span class="label">EDIT</span>
        </button>
        <button id="clear" class="btn-danger" title="Clear All">
            <span class="icon">🗑️</span>
            <span class="label">CLEAR</span>
        </button>
    </div>

    <!-- Response Section -->
    <div class="response-section">
        <div class="section-header">
            <span class="icon">💬</span>
            <h3>RESPONSE</h3>
        </div>
        <div id="response" class="response-box"></div>
    </div>

    <!-- Action Buttons -->
    <div class="actions">
        <button id="copy" class="btn-action" title="Copy Response">
            <span class="icon">📋</span>
            <span class="label">COPY</span>
        </button>
        <button id="export" class="btn-action" title="Export Options">
            <span class="icon">💾</span>
            <span class="label">EXPORT</span>
        </button>
        <button id="summarize" class="btn-special" title="Summarize Current Page">
            <span class="icon">📄</span>
            <span class="label">SUMMARIZE</span>
        </button>
    </div>

    <!-- GitHub Footer -->
    <div class="github-footer">
        <a href="https://github.com/anooshdhamshetty" target="_blank" class="github-link" title="View on GitHub">
            <svg class="github-icon" viewBox="0 0 16 16" width="20" height="20">
                <path fill="currentColor" d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27.68 0 1.36.09 2 .27 1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.013 8.013 0 0016 8c0-4.42-3.58-8-8-8z"/>
            </svg>
            <span class="github-text">@anooshdhamshetty</span>
        </a>
    </div>
</div>

<!-- Export Modal -->
<div id="exportModal" class="modal">
    <div class="modal-content">
        <div class="modal-header">
            <h2>EXPORT OPTIONS</h2>
            <span class="close">&times;</span>
        </div>
        <div class="modal-body">
            <button id="exportTxt" class="modal-btn">
                <span class="icon">📝</span>
                <span>Export as TXT</span>
            </button>
            <button id="exportPdf" class="modal-btn">
                <span class="icon">📕</span>
                <span>Export as PDF</span>
            </button>
            <button id="exportDocx" class="modal-btn">
                <span class="icon">📘</span>
                <span>Export as RTF (Word)</span>
            </button>
            <button id="exportHtml" class="modal-btn">
                <span class="icon">🌐</span>
                <span>Export as HTML</span>
            </button>
        </div>
    </div>
</div>

<!-- Voice Recording Modal -->
<div id="voiceModal" class="modal">
    <div class="modal-content voice-modal">
        <div class="modal-header">
            <h2>VOICE INPUT</h2>
            <span class="close-voice">&times;</span>
        </div>
        <div class="modal-body">
            <div class="voice-animation">
                <div class="pulse-ring"></div>
                <div class="pulse-ring"></div>
                <div class="pulse-ring"></div>
                <span class="mic-icon">🎤</span>
            </div>
            <p id="voiceStatus">Please allow microphone access when Chrome asks...</p>
        </div>
    </div>
</div>

<script src="popup.js"></script>

</body>
</html>
