<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48">
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00ff88;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#00ffff;stop-opacity:1" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <rect width="48" height="48" rx="8" fill="#0a0e27"/>
  <circle cx="24" cy="24" r="18" fill="none" stroke="url(#grad1)" stroke-width="2" filter="url(#glow)"/>
  <text x="24" y="30" font-size="20" font-weight="bold" fill="url(#grad1)" text-anchor="middle" font-family="Arial" filter="url(#glow)">AB</text>
  <text x="24" y="40" font-size="6" fill="#00ff88" text-anchor="middle" font-family="Arial">CHATBOX</text>
</svg>