<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128">
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00ff88;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#00ffff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ff00ff;stop-opacity:1" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Background -->
  <rect width="128" height="128" rx="20" fill="#0a0e27"/>
  
  <!-- Outer glow circle -->
  <circle cx="64" cy="64" r="50" fill="none" stroke="url(#grad1)" stroke-width="3" opacity="0.3" filter="url(#glow)"/>
  <circle cx="64" cy="64" r="45" fill="none" stroke="url(#grad1)" stroke-width="2" filter="url(#glow)"/>
  
  <!-- Gaming controller icon elements -->
  <rect x="34" y="48" width="60" height="35" rx="8" fill="none" stroke="url(#grad1)" stroke-width="3" filter="url(#glow)"/>
  
  <!-- D-pad -->
  <line x1="48" y1="65" x2="56" y2="65" stroke="url(#grad1)" stroke-width="2"/>
  <line x1="52" y1="61" x2="52" y2="69" stroke="url(#grad1)" stroke-width="2"/>
  
  <!-- Buttons -->
  <circle cx="76" cy="61" r="3" fill="url(#grad1)"/>
  <circle cx="84" cy="69" r="3" fill="url(#grad1)"/>
  
  <!-- Main text -->
  <text x="64" y="48" font-size="28" font-weight="bold" fill="url(#grad1)" text-anchor="middle" font-family="Arial, sans-serif" filter="url(#glow)">AB</text>
  
  <!-- Subtitle -->
  <text x="64" y="100" font-size="12" font-weight="bold" fill="#00ff88" text-anchor="middle" font-family="Arial, sans-serif" letter-spacing="2">CHATBOX</text>
  
  <!-- Corner accents -->
  <line x1="15" y1="25" x2="25" y2="25" stroke="#00ff88" stroke-width="2"/>
  <line x1="15" y1="25" x2="15" y2="35" stroke="#00ff88" stroke-width="2"/>
  
  <line x1="103" y1="25" x2="113" y2="25" stroke="#00ffff" stroke-width="2"/>
  <line x1="113" y1="25" x2="113" y2="35" stroke="#00ffff" stroke-width="2"/>
  
  <line x1="15" y1="93" x2="15" y2="103" stroke="#ff00ff" stroke-width="2"/>
  <line x1="15" y1="103" x2="25" y2="103" stroke="#ff00ff" stroke-width="2"/>
  
  <line x1="113" y1="93" x2="113" y2="103" stroke="#00ff88" stroke-width="2"/>
  <line x1="103" y1="103" x2="113" y2="103" stroke="#00ff88" stroke-width="2"/>
</svg>